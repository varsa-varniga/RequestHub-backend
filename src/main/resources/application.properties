# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:MISSING_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:MISSING_USER}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:MISSING_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# HikariCP
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=30000

# Server
server.port=${PORT:10000}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}